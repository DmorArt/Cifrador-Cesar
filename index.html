<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cifrador de Discos César - Daniel Morisio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --theme-color: #fbbf24;
            --theme-color-rgb: 251, 191, 36;
        }

        body {
            background-color: #050505;
            color: #e5e5e5;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            touch-action: none;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: #1a1a1a;
            border-radius: 10px;
        }

        textarea {
            caret-color: var(--theme-color);
        }

        .glow-text {
            text-shadow: 0 0 35px rgba(var(--theme-color-rgb), 0.4);
        }

        .theme-accent { color: var(--theme-color); }
        .theme-bg { background-color: var(--theme-color); }
        .theme-border { border-color: rgba(var(--theme-color-rgb), 0.2); }
        .theme-border-active { border-color: rgba(var(--theme-color-rgb), 0.5); }
        .theme-glow-bg { background-color: rgba(var(--theme-color-rgb), 0.1); }

        #disk-wrapper {
            user-select: none;
            -webkit-user-drag: none;
        }

        #theme-dropdown {
            transform-origin: top right;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        #theme-dropdown.hidden {
            display: none;
            opacity: 0;
            transform: scale(0.95) translateY(-10px);
        }
        
        #theme-dropdown.show {
            display: block;
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .palette-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .palette-btn:hover { transform: scale(1.15); border-color: rgba(255,255,255,0.3); }
        .palette-btn.active { border-color: white; box-shadow: 0 0 15px currentColor; }
    </style>
</head>
<body class="selection:bg-neutral-500/30">

    <div class="min-h-screen p-4 lg:p-6 flex flex-col items-center justify-center">
        
        <header class="w-full max-w-[1850px] flex justify-between items-center mb-6 px-4">
            <div class="flex items-center gap-5">
                <div class="theme-bg p-3 rounded-2xl shadow-xl shadow-black/50 transition-colors duration-500">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-black uppercase tracking-[0.4em] text-white">Cifrador César</h1>
                    <p class="text-[12px] text-neutral-400 font-mono tracking-widest uppercase italic transition-colors">Daniel Morisio // High Performance Crypto Instrument</p>
                </div>
            </div>

            <div class="relative">
                <button id="theme-menu-btn" class="flex items-center gap-3 bg-neutral-900/40 p-3 px-5 rounded-2xl border border-neutral-800/50 hover:bg-neutral-800/60 transition-all active:scale-95 group">
                    <div class="w-3 h-3 rounded-full theme-bg shadow-[0_0_10px_var(--theme-color)]"></div>
                    <span class="text-[9px] font-black uppercase tracking-widest text-neutral-400 group-hover:text-neutral-200">Settings</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-neutral-600 group-hover:text-neutral-400"><path d="m6 9 6 6 6-6"/></svg>
                </button>

                <div id="theme-dropdown" class="hidden absolute right-0 mt-3 w-56 bg-neutral-900/95 backdrop-blur-xl border border-neutral-800 rounded-3xl p-5 shadow-2xl z-50">
                    <div class="text-[8px] font-black uppercase tracking-widest text-neutral-600 mb-4 px-1">Frecuencia Visual</div>
                    <div class="grid grid-cols-3 gap-3 justify-items-center mb-6">
                        <div class="palette-btn active" data-color="#fbbf24" data-rgb="251, 191, 36" style="background-color: #fbbf24; color: #fbbf24;" title="Ámbar"></div>
                        <div class="palette-btn" data-color="#06b6d4" data-rgb="6, 182, 212" style="background-color: #06b6d4; color: #06b6d4;" title="Cian"></div>
                        <div class="palette-btn" data-color="#10b981" data-rgb="16, 185, 129" style="background-color: #10b981; color: #10b981;" title="Esmeralda"></div>
                        <div class="palette-btn" data-color="#f43f5e" data-rgb="244, 63, 94" style="background-color: #f43f5e; color: #f43f5e;" title="Rubí"></div>
                        <div class="palette-btn" data-color="#a855f7" data-rgb="168, 85, 247" style="background-color: #a855f7; color: #a855f7;" title="Amatista"></div>
                        <div class="palette-btn" data-color="#ffffff" data-rgb="255, 255, 255" style="background-color: #ffffff; color: #ffffff;" title="Puro"></div>
                    </div>

                    <div class="h-px bg-neutral-800/60 mb-5"></div>

                    <div class="text-[8px] font-black uppercase tracking-widest text-neutral-600 mb-3 px-1">Configuración de Sistema</div>
                    <button id="audio-toggle-btn" class="w-full flex items-center justify-between bg-black/40 p-3 rounded-xl border border-neutral-800/50 hover:bg-neutral-800/40 transition-all group/toggle">
                        <div class="flex items-center gap-3">
                            <div id="audio-status-dot" class="w-2 h-2 rounded-full theme-bg shadow-[0_0_8px_var(--theme-color)]"></div>
                            <span class="text-[9px] font-bold uppercase tracking-widest text-neutral-400 group-hover/toggle:text-neutral-200">Audio Feedback</span>
                        </div>
                        <span id="audio-status-label" class="text-[8px] font-black text-neutral-500 group-hover/toggle:text-white transition-colors">ON</span>
                    </button>
                </div>
            </div>
        </header>

        <main class="w-full max-w-[1850px] grid grid-cols-1 lg:grid-cols-12 gap-6 flex-1 items-stretch">
            
            <div class="lg:col-span-8 flex flex-col md:flex-row items-center justify-center bg-gradient-to-br from-neutral-900/40 to-black p-6 lg:p-12 rounded-[4rem] border border-neutral-800/30 shadow-2xl relative overflow-hidden group">
                <div id="ambient-glow" class="absolute inset-0 transition-all duration-700 pointer-events-none"></div>
                <div class="absolute top-0 right-0 w-64 h-64 theme-glow-bg rounded-full blur-[120px] pointer-events-none opacity-20"></div>
                
                <div id="disk-wrapper" class="relative w-full max-w-[900px] aspect-square flex items-center justify-center mx-auto">
                    <div id="disk-glow" class="absolute w-[94%] h-[94%] rounded-full transition-all duration-500 pointer-events-none z-0"></div>
                    <canvas id="mainDisk" width="1600" height="1600" class="w-full h-full relative z-10 cursor-grab active:cursor-grabbing"></canvas>
                </div>

                <div class="flex flex-col items-center justify-center md:border-l border-neutral-800/20 md:pl-12 mt-8 md:mt-0 min-w-[240px]">
                    <div class="relative">
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 theme-glow-bg rounded-full blur-[100px] animate-pulse"></div>
                        <div class="relative flex flex-col items-center">
                            <span class="text-[13px] font-black uppercase tracking-[0.5em] text-neutral-400 mb-4 transition-colors">Desplazamiento</span>
                            <div id="shift-value" class="text-7xl md:text-9xl font-black theme-accent tabular-nums glow-text transition-colors duration-500 leading-none select-none tracking-tighter">03</div>
                            <div class="w-24 h-1 theme-bg opacity-30 rounded-full mt-8 mb-8"></div>
                            
                            <button id="disk-reset-btn" class="disk-action-btn flex items-center gap-3 px-6 py-3 bg-neutral-900/80 text-neutral-500 rounded-2xl border border-neutral-800 transition-all active:scale-95 group/btn" title="Reiniciar Disco">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="transition-transform duration-500"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                                <span class="text-[10px] font-bold uppercase tracking-[0.2em]">Reset Disco</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4 flex flex-col gap-6">
                <div class="bg-neutral-900/40 p-8 rounded-[4rem] border border-neutral-800/40 backdrop-blur-xl shadow-2xl h-full flex flex-col justify-between">
                    <div class="space-y-6 flex-1">
                        <div class="space-y-2">
                            <label class="text-[13px] font-black uppercase tracking-[0.4em] text-neutral-400 ml-2 transition-colors">Entrada de Texto</label>
                            <textarea id="input-text" placeholder="Escribe aquí tu mensaje confidencial..." class="w-full h-36 bg-black/40 border border-neutral-800/60 rounded-[2.5rem] p-8 text-lg focus:theme-border-active transition-all outline-none resize-none placeholder:text-neutral-800 text-neutral-300 shadow-inner font-sans"></textarea>
                        </div>

                        <div class="space-y-3">
                            <div class="flex justify-between items-center px-2">
                                <label class="text-[13px] font-black uppercase tracking-[0.4em] text-neutral-400 transition-colors">Resultado Cifrado</label>
                                <button id="copy-btn" class="px-6 py-2.5 theme-glow-bg hover:bg-white/5 rounded-2xl transition-all theme-accent text-[11px] font-bold uppercase tracking-widest theme-border active:scale-95 shadow-lg">
                                    Copiar
                                </button>
                            </div>
                            <div id="output-text" class="w-full min-h-[220px] theme-glow-bg border theme-border rounded-[2.5rem] p-8 font-mono text-2xl theme-accent break-all leading-relaxed shadow-inner transition-colors duration-500">
                                <span class="text-neutral-800 italic text-sm font-sans">El texto aparecerá aquí...</span>
                            </div>
                        </div>
                    </div>

                    <button id="reset-btn" class="w-full mt-8 py-6 flex items-center justify-center gap-3 bg-neutral-800/40 hover:bg-red-950/20 hover:text-red-500 border border-neutral-800/40 text-neutral-500 rounded-[2.5rem] font-bold transition-all text-[11px] tracking-[0.4em] uppercase active:scale-95">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                        Reiniciar Todo el Sistema
                    </button>
                </div>
            </div>
        </main>

        <footer class="py-8 text-center w-full opacity-80 border-t border-neutral-900 mt-4">
            <p class="text-neutral-400 text-[10px] font-bold uppercase tracking-[0.5em] transition-colors">
                © Daniel Morisio // Visual Logic Research Lab // 2026
            </p>
        </footer>
    </div>

    <script>
        const ALPHABET = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ".split("");
        const total = ALPHABET.length;
        
        let state = {
            shift: 3,
            lastShift: 3,
            rotation: 3 * (360 / total),
            message: '',
            isDragging: false,
            startAngle: 0,
            themeColor: '#fbbf24',
            themeRGB: '251, 191, 36',
            isMuted: false
        };

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function playTick() {
            if (state.isMuted) return;
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const now = audioCtx.currentTime;
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'triangle';
            osc1.frequency.setValueAtTime(150, now);
            osc1.frequency.exponentialRampToValueAtTime(40, now + 0.08);
            gain1.gain.setValueAtTime(0.18, now);
            gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
            
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(2200, now);
            osc2.frequency.exponentialRampToValueAtTime(1800, now + 0.03);
            gain2.gain.setValueAtTime(0.06, now);
            gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.03);

            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            
            osc1.start(now);
            osc1.stop(now + 0.08);
            osc2.start(now);
            osc2.stop(now + 0.03);
        }

        const canvas = document.getElementById('mainDisk');
        const ctx = canvas.getContext('2d');
        const diskGlow = document.getElementById('disk-glow');
        const ambientGlow = document.getElementById('ambient-glow');
        const inputEl = document.getElementById('input-text');
        const outputEl = document.getElementById('output-text');
        const shiftDisplay = document.getElementById('shift-value');
        const resetBtn = document.getElementById('reset-btn');
        const diskResetBtn = document.getElementById('disk-reset-btn');
        const copyBtn = document.getElementById('copy-btn');
        const themeMenuBtn = document.getElementById('theme-menu-btn');
        const themeDropdown = document.getElementById('theme-dropdown');
        const paletteBtns = document.querySelectorAll('.palette-btn');
        const audioToggleBtn = document.getElementById('audio-toggle-btn');
        const audioStatusDot = document.getElementById('audio-status-dot');
        const audioStatusLabel = document.getElementById('audio-status-label');

        themeMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            themeDropdown.classList.toggle('hidden');
            themeDropdown.classList.toggle('show');
        });

        document.addEventListener('click', () => {
            themeDropdown.classList.add('hidden');
            themeDropdown.classList.remove('show');
        });

        audioToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            state.isMuted = !state.isMuted;
            if (state.isMuted) {
                audioStatusDot.classList.replace('theme-bg', 'bg-neutral-800');
                audioStatusDot.style.boxShadow = 'none';
                audioStatusLabel.textContent = 'OFF';
                audioStatusLabel.classList.replace('text-neutral-500', 'text-red-500');
            } else {
                audioStatusDot.classList.replace('bg-neutral-800', 'theme-bg');
                audioStatusDot.style.boxShadow = `0 0 8px var(--theme-color)`;
                audioStatusLabel.textContent = 'ON';
                audioStatusLabel.classList.replace('text-red-500', 'text-neutral-500');
                playTick();
            }
        });

        function setTheme(color, rgb) {
            state.themeColor = color;
            state.themeRGB = rgb;
            document.documentElement.style.setProperty('--theme-color', color);
            document.documentElement.style.setProperty('--theme-color-rgb', rgb);
            update();
        }

        paletteBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                paletteBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                setTheme(btn.dataset.color, btn.dataset.rgb);
            });
        });

        function draw() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(centerX, centerY) * 0.94;
            const angleStep = (Math.PI * 2) / total;
            const innerR = radius * 0.68;
            const knobRadius = radius * 0.32;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Disco Exterior
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            let gradOuter = ctx.createRadialGradient(centerX, centerY, radius * 0.8, centerX, centerY, radius);
            gradOuter.addColorStop(0.85, '#0a0a0a');
            gradOuter.addColorStop(1, '#1a1a1a');
            ctx.fillStyle = gradOuter;
            ctx.fill();
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 4;
            ctx.stroke();

            // LÍNEAS SEPARADORAS EXTERIORES (Letras Grises - Desvanecimiento hacia AFUERA)
            ctx.save();
            let outerLinesGrad = ctx.createRadialGradient(centerX, centerY, innerR, centerX, centerY, radius);
            outerLinesGrad.addColorStop(0, '#666');
            outerLinesGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.strokeStyle = outerLinesGrad;
            ctx.lineWidth = 2.0;
            for(let i = 0; i < total; i++) {
                const angle = (i + 0.5) * angleStep - Math.PI / 2;
                ctx.beginPath();
                ctx.moveTo(centerX + Math.cos(angle) * innerR, centerY + Math.sin(angle) * innerR);
                ctx.lineTo(centerX + Math.cos(angle) * radius, centerY + Math.sin(angle) * radius);
                ctx.stroke();
            }
            ctx.restore();

            const outerTextRadius = radius * 0.88;
            ctx.font = `bold ${radius * 0.135}px Inter`;
            ctx.fillStyle = '#9aa'; 
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ALPHABET.forEach((letter, i) => {
                const angle = i * angleStep - Math.PI / 2;
                const tx = centerX + Math.cos(angle) * outerTextRadius;
                const ty = centerY + Math.sin(angle) * outerTextRadius;
                ctx.save();
                ctx.translate(tx, ty);
                ctx.rotate(angle + Math.PI/2);
                ctx.fillText(letter, 0, 0);
                ctx.restore();
            });

            ctx.save();
            ctx.translate(centerX, centerY - radius - 15);
            ctx.beginPath();
            ctx.moveTo(0, 35); 
            ctx.lineTo(-22, 0);
            ctx.lineTo(22, 0);
            ctx.closePath();
            ctx.fillStyle = state.themeColor;
            ctx.shadowColor = `rgba(${state.themeRGB}, 0.8)`;
            ctx.shadowBlur = 20;
            ctx.fill();
            ctx.restore();

            const markerR = radius * 0.76;
            ctx.save();
            ctx.beginPath();
            ctx.arc(centerX, centerY - markerR, radius * 0.052, 0, Math.PI * 2);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 10;
            ctx.stroke();
            ctx.restore();

            // 2. Grupo Giratorio (Disco Interno)
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(state.rotation * Math.PI / 180);
            ctx.translate(-centerX, -centerY);

            // Fondo del Disco Interno
            ctx.shadowColor = 'rgba(0,0,0,0.8)';
            ctx.shadowBlur = 50;
            ctx.shadowOffsetY = 20;
            ctx.beginPath();
            ctx.arc(centerX, centerY, innerR, 0, Math.PI * 2);
            let gradInner = ctx.createRadialGradient(centerX, centerY, innerR * 0.6, centerX, centerY, innerR);
            gradInner.addColorStop(0.6, '#222');
            gradInner.addColorStop(1, '#111');
            ctx.fillStyle = gradInner;
            ctx.fill();
            ctx.shadowColor = 'transparent';
            ctx.strokeStyle = state.themeColor;
            ctx.lineWidth = 6;
            ctx.stroke();

            // LÍNEAS SEPARADORAS INTERIORES (Letras Ámbar - Desvanecimiento AFUERA HACIA ADENTRO)
            ctx.save();
            // Invertimos el gradiente: opaco en innerR, transparente en knobRadius
            let innerLinesGrad = ctx.createRadialGradient(centerX, centerY, knobRadius, centerX, centerY, innerR);
            innerLinesGrad.addColorStop(0, 'rgba(0, 0, 0, 0)'); // Transparente en la perilla
            innerLinesGrad.addColorStop(1, `rgba(${state.themeRGB}, 0.5)`); // Opaco en el borde exterior del disco móvil
            
            ctx.strokeStyle = innerLinesGrad;
            ctx.lineWidth = 1.4;
            for(let i = 0; i < total; i++) {
                const angle = (i + 0.5) * angleStep - Math.PI / 2;
                ctx.beginPath();
                ctx.moveTo(centerX + Math.cos(angle) * knobRadius, centerY + Math.sin(angle) * knobRadius);
                ctx.lineTo(centerX + Math.cos(angle) * innerR, centerY + Math.sin(angle) * innerR);
                ctx.stroke();
            }
            ctx.restore();

            // Índices Numéricos
            ctx.font = `500 ${radius * 0.054}px "JetBrains Mono"`;
            ctx.fillStyle = `rgba(${state.themeRGB}, 0.85)`;
            ALPHABET.forEach((_, i) => {
                const angle = i * angleStep - Math.PI / 2; 
                const txNum = centerX + Math.cos(angle) * (radius * 0.76);
                const tyNum = centerY + Math.sin(angle) * (radius * 0.76);
                ctx.save();
                ctx.translate(txNum, tyNum);
                ctx.rotate(angle + Math.PI/2);
                ctx.fillText(i, 0, 0);
                ctx.restore();
            });

            // Letras Ambar Internas
            ctx.font = `500 ${radius * 0.095}px Inter`;
            ctx.fillStyle = state.themeColor;
            ALPHABET.forEach((letter, i) => {
                const angle = i * angleStep - Math.PI / 2;
                const tx = centerX + Math.cos(angle) * (innerR * 0.81);
                const ty = centerY + Math.sin(angle) * (innerR * 0.81);
                ctx.save();
                ctx.translate(tx, ty);
                ctx.rotate(angle + Math.PI/2);
                ctx.fillText(letter, 0, 0);
                ctx.restore();
            });

            // 3. Perilla Central Cilíndrica 3D
            const numTeeth = 32;
            const toothHeight = 8;
            const toothWidth = (Math.PI * 2) / (numTeeth * 2);

            ctx.save();
            ctx.beginPath();
            for(let i = 0; i < numTeeth * 2; i++) {
                const angle = i * toothWidth;
                const r = (i % 2 === 0) ? knobRadius + 18 : knobRadius + 18 - toothHeight;
                ctx.lineTo(centerX + Math.cos(angle) * r, centerY + Math.sin(angle) * r);
            }
            ctx.closePath();
            ctx.fillStyle = 'rgba(0,0,0,0.75)';
            ctx.fill();
            ctx.restore();

            ctx.beginPath();
            for(let i = 0; i < numTeeth * 2; i++) {
                const angle = i * toothWidth;
                const r = (i % 2 === 0) ? knobRadius : knobRadius - toothHeight;
                ctx.lineTo(centerX + Math.cos(angle) * r, centerY + Math.sin(angle) * r);
            }
            ctx.closePath();
            let cylinderGrad = ctx.createLinearGradient(centerX - knobRadius, centerY, centerX + knobRadius, centerY);
            cylinderGrad.addColorStop(0, '#050505');
            cylinderGrad.addColorStop(0.5, '#1a1a1a');
            cylinderGrad.addColorStop(1, '#050505');
            ctx.fillStyle = cylinderGrad;
            ctx.fill();
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            ctx.stroke();

            const topRadius = knobRadius * 0.82;
            ctx.beginPath();
            ctx.arc(centerX, centerY, topRadius + 2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.8)';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(centerX, centerY, topRadius, 0, Math.PI * 2);
            let brushedGrad = ctx.createRadialGradient(centerX - 10, centerY - 10, 0, centerX, centerY, topRadius);
            brushedGrad.addColorStop(0, '#3a3a3a');
            brushedGrad.addColorStop(0.6, '#111111');
            brushedGrad.addColorStop(1, '#080808');
            ctx.fillStyle = brushedGrad;
            ctx.fill();

            ctx.save();
            ctx.globalCompositeOperation = 'overlay';
            let shineGrad = ctx.createLinearGradient(centerX - topRadius, centerY - topRadius, centerX + topRadius, centerY + topRadius);
            shineGrad.addColorStop(0, 'rgba(255,255,255,0.2)');
            shineGrad.addColorStop(0.5, 'rgba(0,0,0,0)');
            shineGrad.addColorStop(1, 'rgba(255,255,255,0.2)');
            ctx.fillStyle = shineGrad;
            ctx.beginPath();
            ctx.arc(centerX, centerY, topRadius, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();

            ctx.beginPath();
            ctx.arc(centerX, centerY, topRadius, 0, Math.PI * 2);
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(centerX, centerY - (topRadius * 0.45));
            ctx.lineTo(centerX, centerY - (topRadius * 0.88));
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2.5; 
            ctx.lineCap = 'round';
            ctx.shadowColor = 'rgba(255,255,255,0.5)';
            ctx.shadowBlur = 4;
            ctx.stroke();
            ctx.shadowBlur = 0;
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 8, 0, Math.PI * 2);
            let ledGrad = ctx.createRadialGradient(centerX - 2, centerY - 2, 0, centerX, centerY, 8);
            ledGrad.addColorStop(0, '#fff');
            ledGrad.addColorStop(0.2, state.themeColor);
            ledGrad.addColorStop(1, '#000');
            ctx.fillStyle = ledGrad;
            ctx.shadowColor = state.themeColor;
            ctx.shadowBlur = 20;
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.restore(); 

            ctx.save();
            ctx.translate(centerX, centerY - (innerR * 0.65)); 
            ctx.beginPath();
            ctx.moveTo(0, -32); 
            ctx.lineTo(-20, 5);
            ctx.lineTo(20, 5);
            ctx.closePath();
            ctx.fillStyle = '#ffffff'; 
            ctx.shadowColor = 'rgba(255, 255, 255, 0.9)';
            ctx.shadowBlur = 12;
            ctx.fill();
            ctx.restore();
        }

        function getAngle(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const x = clientX - rect.left - rect.width / 2;
            const y = clientY - rect.top - rect.height / 2;
            return Math.atan2(y, x) * (180 / Math.PI);
        }

        function encrypt(text, s) {
            return text.toUpperCase().split("").map(char => {
                const idx = ALPHABET.indexOf(char);
                if (idx === -1) return char;
                let newIdx = (idx + s) % total;
                if (newIdx < 0) newIdx += total;
                return ALPHABET[newIdx];
            }).join("");
        }

        function update() {
            const res = encrypt(state.message, state.shift);
            outputEl.innerHTML = res ? res : '<span class="text-neutral-800 italic text-sm font-sans">El texto aparecerá aquí...</span>';
            shiftDisplay.textContent = state.shift.toString().padStart(2, '0');
            if (state.shift !== state.lastShift) {
                playTick();
                state.lastShift = state.shift;
            }
            if (state.isDragging) {
                diskGlow.style.boxShadow = `0 0 50px 15px rgba(${state.themeRGB}, 0.35), inset 0 0 15px rgba(${state.themeRGB}, 0.2)`;
                ambientGlow.style.backgroundColor = `rgba(${state.themeRGB}, 0.015)`;
            } else {
                diskGlow.style.boxShadow = 'none';
                ambientGlow.style.backgroundColor = 'transparent';
            }
            draw();
        }

        canvas.addEventListener('mousedown', (e) => {
            state.isDragging = true;
            state.startAngle = getAngle(e.clientX, e.clientY) - state.rotation;
            canvas.style.cursor = 'grabbing';
            update();
        });

        window.addEventListener('mousemove', (e) => {
            if (!state.isDragging) return;
            const angle = getAngle(e.clientX, e.clientY);
            state.rotation = angle - state.startAngle;
            let normRot = ((-state.rotation % 360) + 360) % 360;
            state.shift = Math.round(normRot / (360 / total)) % total;
            update();
        });

        window.addEventListener('mouseup', () => {
            if (!state.isDragging) return;
            state.isDragging = false;
            canvas.style.cursor = 'grab';
            state.rotation = -(state.shift * (360 / total));
            update();
        });

        canvas.addEventListener('touchstart', (e) => {
            state.isDragging = true;
            state.startAngle = getAngle(e.touches[0].clientX, e.touches[0].clientY) - state.rotation;
            update();
        });

        window.addEventListener('touchmove', (e) => {
            if (!state.isDragging) return;
            const angle = getAngle(e.touches[0].clientX, e.touches[0].clientY);
            state.rotation = angle - state.startAngle;
            let normRot = ((-state.rotation % 360) + 360) % 360;
            state.shift = Math.round(normRot / (360 / total)) % total;
            update();
        });

        window.addEventListener('touchend', () => {
            state.isDragging = false;
            state.rotation = -(state.shift * (360 / total));
            update();
        });

        inputEl.addEventListener('input', (e) => {
            state.message = e.target.value;
            update();
        });

        diskResetBtn.addEventListener('click', () => {
            state.shift = 0;
            state.rotation = 0;
            update();
            playTick();
        });

        resetBtn.addEventListener('click', () => {
            state.message = '';
            state.shift = 0;
            state.rotation = 0;
            inputEl.value = '';
            update();
        });

        copyBtn.addEventListener('click', () => {
            const text = outputEl.innerText;
            if (text && !text.includes("El texto aparecerá aquí")) {
                const tempTextArea = document.createElement("textarea");
                tempTextArea.value = text;
                document.body.appendChild(tempTextArea);
                tempTextArea.select();
                document.execCommand("copy");
                document.body.removeChild(tempTextArea);
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "¡OK!";
                setTimeout(() => copyBtn.innerText = originalText, 1000);
            }
        });

        window.addEventListener('resize', draw);
        draw();
        update();
    </script>
</body>
</html>
